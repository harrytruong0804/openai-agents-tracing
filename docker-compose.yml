version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: openai-tracing-mongodb
    restart: unless-stopped
    ports:
      - '38017:27017'
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=tracingpass
      - MONGO_INITDB_DATABASE=traces
    volumes:
      - mongodb_data:/data/db
    networks:
      - tracing-network

  api:
    image: noitq/oat-api:${OAT_VERSION:-latest}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: openai-tracing-api
    restart: unless-stopped
    ports:
      - '3801:3001'
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MONGODB_URI=mongodb://admin:tracingpass@mongodb:27017/traces?authSource=admin
      - JWT_SECRET=akila-tracing-jwt-secret-2024
    depends_on:
      - mongodb
    networks:
      - tracing-network

  client:
    image: noitq/oat-client:${OAT_VERSION:-latest}
    build:
      context: .
      dockerfile: apps/client/Dockerfile
      args:
        - VITE_API_URL=http://localhost:3801
    container_name: openai-tracing-client
    restart: unless-stopped
    ports:
      - '3800:80'
    depends_on:
      - api
    networks:
      - tracing-network

networks:
  tracing-network:
    driver: bridge

volumes:
  mongodb_data:
